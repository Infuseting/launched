<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game Logs</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background: #0a0a0a;
        color: #2ecc71;
        font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
        font-size: 13px;
        height: 100vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      #header {
        background: #111;
        padding: 10px 15px;
        border-bottom: 1px solid #333;
        display: flex;
        justify-content: space-between;
        align-items: center;
        user-select: none;
        -webkit-app-region: drag;
      }
      #title {
        color: #eee;
        font-weight: bold;
        font-size: 14px;
      }
      #log-container {
        flex: 1;
        padding: 15px;
        overflow-y: auto;
        white-space: pre-wrap;
        word-break: break-all;
      }
      .log-entry {
        margin-bottom: 4px;
        line-height: 1.4;
      }
      /* Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #222;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #333;
      }
    </style>
  </head>
  <body>
    <div id="header">
      <div id="title">Minecraft Output Console</div>
    </div>
    <div id="log-container">
      <div class="log-entry" style="opacity: 0.5; font-style: italic;">Waiting for game output...</div>
    </div>
    <script type="module" src="./src/logs.ts"></script>
  </body>
</html>

name: Release
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.platform }}
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev build-essential curl wget libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Sync node version and setup cache
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm install

      - name: Add macOS x86 target
        if: matrix.platform == 'macos-latest'
        run: rustup target add x86_64-apple-darwin

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Launched v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.platform == 'macos-latest' && '--target universal-apple-darwin' || '' }}

      - name: Debug Output
        if: always()
        run: |
          echo "Listing build artifacts:"
          ls -R src-tauri/target/release/bundle || echo "Bundle dir not found"

      - name: Locate updater files
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          echo "Searching for updater manifests in workspace..."
          find . -type f \( -name "latest.json" -o -name "update.json" \) | sed -n '1,200p'

      - name: Deploy Update Metadata
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = context.ref.replace('refs/tags/', '');

            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100,
            });

            const release = releases.find(r => r.tag_name === tag);
            if (!release) {
              core.setFailed(`Release not found for tag ${tag}`);
              return;
            }

            const latestAsset = release.assets.find(a => a.name === 'latest.json');
            if (!latestAsset) {
              core.setFailed(`latest.json asset not found on release ${tag}`);
              return;
            }

            const response = await github.request('GET /repos/{owner}/{repo}/releases/assets/{asset_id}', {
              owner,
              repo,
              asset_id: latestAsset.id,
              headers: {
                accept: 'application/octet-stream',
              },
            });

            const outDir = path.join(process.cwd(), 'src-tauri', 'target', 'release', 'bundle');
            fs.mkdirSync(outDir, { recursive: true });
            const outFile = path.join(outDir, 'update.json');

            const content = typeof response.data === 'string'
              ? response.data
              : JSON.stringify(response.data);

            fs.writeFileSync(outFile, content, 'utf8');
            core.info(`Wrote updater manifest to ${outFile}`);

      - name: Upload updater manifest artifact
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: updater-manifest
          path: src-tauri/target/release/bundle/update.json

      - name: Publish to GitHub Pages
        if: matrix.platform == 'ubuntu-22.04'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: src-tauri/target/release/bundle
          publish_branch: gh-pages
          destination_dir: .
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          force_orphan: false
          keep_files: true

